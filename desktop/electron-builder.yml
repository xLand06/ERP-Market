appId: com.sofimar.erp-market
productName: ERP-Market
copyright: Copyright © 2025 Abastos Sofimar

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/electron-vite/**"
  - "!node_modules/ts-node/**"

extraFiles:
  - from: "../backend/dist"
    to: "resources/backend"
    filter:
      - "**/*"
  - from: "../backend/node_modules"
    to: "resources/backend/node_modules"
    filter:
      - "**/*"
      - ".prisma/**/*"
      - "!prisma/**"
  - from: "../node_modules/@prisma"
    to: "resources/backend/node_modules/@prisma"
    filter:
      - "**/*"

win:
  target:
    - target: dir
      arch:
        - x64

publish: null